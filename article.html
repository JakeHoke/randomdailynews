<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title is updated by article.js after the Firestore fetch resolves -->
    <!-- URL format: /article.html?id=ARTICLE_ID -->
    <title>Article — Random Daily News</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Shared site styles (header, footer, pills, etc.) -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Article-specific layout and typography -->
    <link rel="stylesheet" href="css/article.css">
</head>
<body>

    <!-- ============================================
         HEADER COMPONENT MOUNT
         Fetched from header.html and injected by article.js
         ============================================ -->
    <div id="header-mount"></div>

    <!-- ============================================
         ARTICLE PAGE
         Two phases of content:
           Phase 1 — Immediate (from URL params):
             title, date
           Phase 2 — API (from data/articles/{id}.json):
             tagline, author, read time, category,
             hero image, body paragraphs, tags
         ============================================ -->
    <main class="article-page">
        <div class="article-wrap">

            <!-- Breadcrumb -->
            <nav class="article-breadcrumb" aria-label="Breadcrumb">
                <a href="/" class="breadcrumb-link">&larr; Back to Home</a>
            </nav>

            <!-- ==========================================
                 ARTICLE HEADER
                 Title and date inject immediately from URL.
                 Category, tagline, author, read time inject
                 after the API call resolves.
                 ========================================== -->
            <header class="article-header">
                <div class="article-meta-top">
                    <!-- Category pill: updated by API call with correct color class -->
                    <span id="article-category" class="category-pill pill-satire">SATIRE</span>
                    <!-- Read time: injected by API -->
                    <span id="article-read-time" class="article-read-time"></span>
                </div>

                <!-- Title: set immediately from URL ?title= param -->
                <h1 id="article-title" class="article-title"></h1>

                <!-- Tagline/subtitle: injected by API -->
                <p id="article-tagline" class="article-tagline"></p>

                <div class="article-byline">
                    <!-- Author: injected by API -->
                    <span id="article-author" class="article-author"></span>
                    <span class="byline-sep" id="byline-sep" style="display:none">·</span>
                    <!-- Date: set immediately from URL ?date= param -->
                    <time id="article-date" class="article-date"></time>
                </div>
            </header>

            <!-- ==========================================
                 HERO IMAGE
                 src and alt injected by API call.
                 Caption injected by API call.
                 ========================================== -->
            <figure class="article-figure" id="article-figure">
                <img id="article-image" src="" alt="" class="article-image">
                <figcaption id="article-caption" class="article-caption"></figcaption>
            </figure>

            <!-- ==========================================
                 SATIRE NOTICE
                 Always visible. Reminds reader this is parody.
                 ========================================== -->
            <div class="satire-notice" role="note">
                <span class="satire-notice-icon">⚠</span>
                <span><strong>Satire Notice:</strong> This article is AI-generated parody content. It is not real news and should not be treated as fact.</span>
            </div>

            <!-- ==========================================
                 ARTICLE BODY
                 Paragraphs injected by API call.
                 .is-loading triggers skeleton shimmer.
                 JS removes .is-loading after inject.
                 ========================================== -->
            <div id="article-body" class="article-body is-loading">
                <div class="body-skeleton" id="body-skeleton">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line skeleton-line--short"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line skeleton-line--medium"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line skeleton-line--short"></div>
                    <div class="skeleton-line skeleton-line--medium"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>

            <!-- ==========================================
                 TAGS
                 Injected by API call as pill elements.
                 ========================================== -->
            <div id="article-tags" class="article-tags"></div>

            <!-- ==========================================
                 SHARE SECTION
                 Static UI. Copy Link uses Clipboard API.
                 ========================================== -->
            <div class="article-share">
                <span class="share-label">Share this story</span>
                <div class="share-buttons">
                    <a href="#" class="share-btn" id="share-twitter" aria-label="Share on Twitter">Twitter / X</a>
                    <a href="#" class="share-btn" id="share-facebook" aria-label="Share on Facebook">Facebook</a>
                    <button class="share-btn share-btn--copy" id="share-copy" aria-label="Copy link">Copy Link</button>
                </div>
            </div>

        </div><!-- /article-wrap -->
    </main>

    <!-- ============================================
         FOOTER COMPONENT MOUNT
         Fetched from footer.html and injected by article.js
         ============================================ -->
    <div id="footer-mount"></div>

    <!-- type="module" enables ES import/export and auto-defers execution -->
    <script type="module" src="js/article.js"></script>
</body>
</html>
